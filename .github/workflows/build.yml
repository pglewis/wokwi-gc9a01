name: Publish chip

on:
  push:
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  payload:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate payload
        run: |
          test -s chip.json && test -s chip.wasm
          test -s ec11-adapter/chip.json && test -s ec11-adapter/chip.wasm
      - name: Select payload
        run: |
          mkdir payload
          if [[ "${GITHUB_REF_NAME}" == v2.* ]]; then
            cp ec11-adapter/chip.json ec11-adapter/chip.wasm payload/
          else
            cp chip.json chip.wasm payload/
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: chip
          path: payload/

  release:
    needs: payload
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: chip
          path: chip
      - name: Package chip
        run: cd chip && zip -9 ../chip.zip chip.json chip.wasm
      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          artifacts: chip.zip
          generateReleaseNotes: true
